name: Release WASM
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up GraalVM
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '22'
        distribution: 'graalvm-community'
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Setup WASI-SDK
      run: |
        wget https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-24/wasi-sdk-24.0-x86_64-linux.tar.gz
        tar xf wasi-sdk-24.0-x86_64-linux.tar.gz
        echo "WASI_SDK_PATH=$PWD/wasi-sdk-24.0-x86_64-linux" >> $GITHUB_ENV

    - name: Build Standard JAR
      run: mvn clean package -DskipTests
      
    - name: Generate WASM Binary
      run: |
        chmod +x build_wasm.sh
        ./build_wasm.sh
        
    - name: Verify WASM File Exists
      run: |
        if [ ! -f target/wasm/cdd-java.wasm ]; then
          echo "WASM file not found!"
          exit 1
        fi
        
    - name: Rename and Checksum
      run: |
        cp target/wasm/cdd-java.wasm ./cdd-java.wasm
        sha256sum cdd-java.wasm > cdd-java.wasm.sha256
        
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          cdd-java.wasm
          cdd-java.wasm.sha256
        body: "Standalone WASI binary for cdd-java compiled via GraalVM Native Image."
        draft: false
        prerelease: false
