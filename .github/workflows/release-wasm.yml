name: Release WASM & NPM Package
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up GraalVM
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '25'
        distribution: 'graalvm'
        github-token: ${{ secrets.GITHUB_TOKEN }}
        cache: 'maven'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        registry-url: 'https://registry.npmjs.org'

    - name: Build Standard JAR
      run: mvn clean package -DskipTests
        
    - name: Generate WASM
      run: |
        chmod +x build_wasm.sh
        ./build_wasm.sh
        
    - name: Build JS Wrapper & NPM Package
      run: |
        cd package
        npm install
        npm run build
        cp ../target/wasm/cdd-java.js ./dist/cdd-java.js
        cp ../target/wasm/cdd-java.js.wasm ./dist/cdd-java.js.wasm
        
    - name: Publish NPM Package
      run: |
        cd package
        VERSION=${GITHUB_REF#refs/tags/v}
        npm version $VERSION --no-git-tag-version
        npm publish --access public || echo "Publishing skipped or failed"
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        
    - name: Rename and Checksum
      run: |
        cp target/wasm/cdd-java.js ./cdd-java.js
        cp target/wasm/cdd-java.js.wasm ./cdd-java.js.wasm
        tar -czf cdd-java-wasm.tar.gz cdd-java.js cdd-java.js.wasm
        sha256sum cdd-java-wasm.tar.gz > cdd-java-wasm.tar.gz.sha256
        
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          cdd-java-wasm.tar.gz
          cdd-java-wasm.tar.gz.sha256
        body: "Standalone WASM module for cdd-java compiled via GraalVM 25 SVM-WASM, bundled with JS Wrapper."
        draft: false
        prerelease: false
