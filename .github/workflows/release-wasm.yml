name: Release WASM & NPM Package
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up GraalVM
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '25'
        distribution: 'graalvm'
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'

    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Install Wasm Toolchain (Binaryen)
      run: |
        curl -L https://github.com/WebAssembly/binaryen/releases/download/version_122/binaryen-version_122-x86_64-linux.tar.gz | tar -xz
        echo "$PWD/binaryen-version_122/bin" >> $GITHUB_PATH
      shell: bash

    - name: Build Standard JAR
      run: mvn clean package -DskipTests
      
    - name: Generate WASM Binary
      run: |
        chmod +x build_wasm.sh
        ./build_wasm.sh
        
    - name: Verify WASM File Exists
      run: |
        if [ ! -f target/wasm/cdd-java.wasm ]; then
          echo "WASM file not found!"
          exit 1
        fi
        
    - name: Build JS Wrapper & NPM Package
      run: |
        cd package
        npm install
        npm run build
        cp ../target/wasm/cdd-java.wasm ./dist/cdd-java.wasm
        
    - name: Publish NPM Package
      run: |
        cd package
        # Update version based on tag
        VERSION=${GITHUB_REF#refs/tags/v}
        npm version $VERSION --no-git-tag-version
        npm publish --access public || echo "Publishing skipped or failed"
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        
    - name: Rename and Checksum
      run: |
        cp target/wasm/cdd-java.wasm ./cdd-java.wasm
        sha256sum cdd-java.wasm > cdd-java.wasm.sha256
        
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          cdd-java.wasm
          cdd-java.wasm.sha256
        body: "Standalone WASI binary for cdd-java compiled via GraalVM Native Image, bundled with JS Wrapper."
        draft: false
        prerelease: false
