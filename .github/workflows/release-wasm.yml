name: Release WASM & NPM Package
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
        
    - name: Download GraalVM 22.3 (Linux)
      run: |
        curl -sL https://github.com/graalvm/graalvm-ce-builds/releases/download/vm-22.3.1/graalvm-ce-java17-linux-amd64-22.3.1.tar.gz | tar -xz
        GRAALVM_DIR=$(find . -maxdepth 1 -type d -name "graalvm-ce-java17*" | head -n 1)
        echo "GRAALVM_HOME=$PWD/${GRAALVM_DIR#./}" >> $GITHUB_ENV
        $PWD/${GRAALVM_DIR#./}/bin/gu install native-image

    - name: Download WASI SDK (Linux)
      run: |
        curl -sL -o wasi-sdk.tar.gz https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-20/wasi-sdk-20.0-linux.tar.gz
        tar -xzf wasi-sdk.tar.gz
        echo "WASI_SDK_PATH=$PWD/wasi-sdk-20.0" >> $GITHUB_ENV

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'

    - name: Build Standard JAR
      run: mvn clean package -DskipTests
      
    - name: Generate WASM Binary
      run: |
        chmod +x build_wasm.sh
        ./build_wasm.sh
        
    - name: Verify WASM File Exists
      run: |
        if [ ! -f target/wasm/cdd-java.wasm ]; then
          echo "WASM file not found!"
          exit 1
        fi
        
    - name: Build JS Wrapper & NPM Package
      run: |
        cd package
        npm install
        npm run build
        cp ../target/wasm/cdd-java.wasm ./dist/cdd-java.wasm
        
    - name: Publish NPM Package
      run: |
        cd package
        # Update version based on tag
        VERSION=${GITHUB_REF#refs/tags/v}
        npm version $VERSION --no-git-tag-version
        npm publish --access public || echo "Publishing skipped or failed"
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        
    - name: Rename and Checksum
      run: |
        cp target/wasm/cdd-java.wasm ./cdd-java.wasm
        sha256sum cdd-java.wasm > cdd-java.wasm.sha256
        
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          cdd-java.wasm
          cdd-java.wasm.sha256
        body: "Standalone WASI binary for cdd-java compiled via GraalVM Native Image, bundled with JS Wrapper."
        draft: false
        prerelease: false
