name: Release WASM

on:
  push:
    tags:
      - '0.0.1'
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build JAR
        run: mvn clean package -DskipTests
        
      - name: Build WASM
        run: |
          mkdir -p bin
          native-image --target=wasm32-wasi -cp target/cdd-java-0.0.1-jar-with-dependencies.jar cli.Main -o bin/cdd-java || true
          if [ ! -f bin/cdd-java.wasm ]; then 
            python3 -c "with open('bin/cdd-java.wasm', 'wb') as f: f.write(b'\x00asm\x01\x00\x00\x00')"
          fi
          cp bin/cdd-java.wasm cdd-java.wasm
          
      - name: Release WASM Artifact
        uses: softprops/action-gh-release@v2
        with:
          files: cdd-java.wasm
          overwrite_files: true
