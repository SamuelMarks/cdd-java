name: Release WASM
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: 'maven'
        
    - name: Build Standard JAR
      run: mvn clean package -DskipTests
      
    - name: Generate Fallback WASM Stub
      run: |
        python3 -c "with open('cdd-java.wasm', 'wb') as f: f.write(b'\x00asm\x01\x00\x00\x00')"
        
    - name: Rename and Checksum
      run: |
        sha256sum cdd-java.wasm > cdd-java.wasm.sha256
        
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          cdd-java.wasm
          cdd-java.wasm.sha256
        body: "Fallback WASM stub. Native WASM is unsupported. Please run the provided Docker image or the .jar directly."
        draft: false
        prerelease: false