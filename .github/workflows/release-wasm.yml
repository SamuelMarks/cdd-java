name: Release WASM
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup GraalVM
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '22'
        distribution: 'graalvm'
        github-token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Download WASI SDK
      run: |
        WASI_SDK_URL="https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-24/wasi-sdk-24.0-x86_64-linux.tar.gz"
        curl -sL -o wasi-sdk.tar.gz $WASI_SDK_URL
        tar -xf wasi-sdk.tar.gz
        echo "WASI_SDK_PATH=$(pwd)/wasi-sdk-24.0-x86_64-linux" >> $GITHUB_ENV
        
    - name: Build Standard JAR
      run: mvn clean package
      
    - name: Compile to WASM
      run: ./build_wasm.sh
      
    - name: Rename and Checksum
      run: |
        mv target/wasm/cdd-java.wasm cdd-java.wasm
        sha256sum cdd-java.wasm > cdd-java.wasm.sha256
        
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          cdd-java.wasm
          cdd-java.wasm.sha256
        body: "WASI Binary compiled with GraalVM Native Image."
        draft: false
        prerelease: false
