name: CI
on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '22'
        distribution: 'temurin'
        cache: 'maven'
        
    - name: Build Standard JAR
      run: mvn clean package
      
    - name: Test Standard JAR
      run: mvn test

    - name: Download GraalVM 25 EA (Linux)
      if: runner.os == 'Linux'
      run: |
        curl -sL https://download.oracle.com/graalvm/25/latest/graalvm-jdk-25_linux-x64_bin.tar.gz | tar -xz
        GRAALVM_DIR=$(find . -maxdepth 1 -type d -name "graalvm-jdk-25*" | head -n 1)
        echo "GRAALVM_HOME=$PWD/${GRAALVM_DIR#./}" >> $GITHUB_ENV

    - name: Download GraalVM 25 EA (macOS)
      if: runner.os == 'macOS'
      run: |
        curl -sL https://download.oracle.com/graalvm/25/latest/graalvm-jdk-25_macos-aarch64_bin.tar.gz | tar -xz
        GRAALVM_DIR=$(find . -maxdepth 1 -type d -name "graalvm-jdk-25*" | head -n 1)
        echo "GRAALVM_HOME=$PWD/${GRAALVM_DIR#./}/Contents/Home" >> $GITHUB_ENV

    - name: Compile to WASM (SVM-WASM)
      run: ./build_wasm.sh

    - name: Verify WASM Exists
      run: |
        if [ ! -f "target/wasm/cdd-java.js" ] || [ ! -f "target/wasm/cdd-java.js.wasm" ]; then
          echo "WASM binary or JS wrapper not found!"
          exit 1
        fi

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Test WASM Help
      run: node target/wasm/cdd-java.js --help

    - name: Upload WASM artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cdd-java-wasm-binary-${{ matrix.os }}
        path: |
          target/wasm/cdd-java.js
          target/wasm/cdd-java.js.wasm

    - name: Build JS Wrapper
      run: |
        cd package
        npm install
        npm run build
        cp ../target/wasm/cdd-java.js ./dist/cdd-java.js
        cp ../target/wasm/cdd-java.js.wasm ./dist/cdd-java.js.wasm
