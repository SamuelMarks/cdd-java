name: CI
on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
        
    - name: Build Standard JAR
      run: mvn clean package
      
    - name: Test Standard JAR
      run: mvn test

    - name: Download GraalVM 22.3 (Linux)
      if: runner.os == 'Linux'
      run: |
        curl -sL https://github.com/graalvm/graalvm-ce-builds/releases/download/vm-22.3.1/graalvm-ce-java17-linux-amd64-22.3.1.tar.gz | tar -xz
        GRAALVM_DIR=$(find . -maxdepth 1 -type d -name "graalvm-ce-java17*" | head -n 1)
        echo "GRAALVM_HOME=$PWD/${GRAALVM_DIR#./}" >> $GITHUB_ENV
        $PWD/${GRAALVM_DIR#./}/bin/gu install native-image

    - name: Download WASI SDK (Linux)
      if: runner.os == 'Linux'
      run: |
        curl -sL -o wasi-sdk.tar.gz https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-20/wasi-sdk-20.0-linux.tar.gz
        tar -xzf wasi-sdk.tar.gz
        echo "WASI_SDK_PATH=$PWD/wasi-sdk-20.0" >> $GITHUB_ENV

    - name: Compile to WASM (WASI)
      if: runner.os == 'Linux'
      run: ./build_wasm.sh

    - name: Verify WASM Exists
      if: runner.os == 'Linux'
      run: |
        if [ ! -f "target/wasm/cdd-java.wasm" ]; then
          echo "WASM binary not found!"
          exit 1
        fi

    - name: Upload WASM artifact
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: cdd-java-wasm-binary
        path: target/wasm/cdd-java.wasm

    - name: Setup Node.js
      if: runner.os == 'Linux'
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Build JS Wrapper
      if: runner.os == 'Linux'
      run: |
        cd package
        npm install
        npm run build
        cp ../target/wasm/cdd-java.wasm ./dist/cdd-java.wasm
