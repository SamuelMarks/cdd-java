name: CI
on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up GraalVM
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '25'
        distribution: 'graalvm'
        github-token: ${{ secrets.GITHUB_TOKEN }}
        cache: 'maven'
        
    - name: Build Standard JAR
      run: mvn clean package
      
    - name: Test Standard JAR
      run: mvn test

    - name: Install Wasm Toolchain (Binaryen)
      run: |
        if [ "$RUNNER_OS" = "Linux" ]; then
          curl -L https://github.com/WebAssembly/binaryen/releases/download/version_122/binaryen-version_122-x86_64-linux.tar.gz | tar -xz
          echo "$PWD/binaryen-version_122/bin" >> $GITHUB_PATH
        elif [ "$RUNNER_OS" = "macOS" ]; then
          curl -L https://github.com/WebAssembly/binaryen/releases/download/version_122/binaryen-version_122-arm64-macos.tar.gz | tar -xz
          echo "$PWD/binaryen-version_122/bin" >> $GITHUB_PATH
        fi
      shell: bash

    - name: Compile to WASM (SVM-WASM)
      run: ./build_wasm.sh

    - name: Verify WASM Exists
      run: |
        if [ ! -f "target/wasm/cdd-java.js" ] || [ ! -f "target/wasm/cdd-java.js.wasm" ]; then
          echo "WASM binary or JS wrapper not found!"
          exit 1
        fi

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Test WASM Help
      run: node target/wasm/cdd-java.js --help

    - name: Upload WASM artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cdd-java-wasm-binary-${{ matrix.os }}
        path: |
          target/wasm/cdd-java.js
          target/wasm/cdd-java.js.wasm

    - name: Build JS Wrapper
      run: |
        cd package
        npm install
        npm run build
        cp ../target/wasm/cdd-java.js ./dist/cdd-java.js
        cp ../target/wasm/cdd-java.js.wasm ./dist/cdd-java.js.wasm
